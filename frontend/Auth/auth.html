<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title data-en="Authentication - Muafa" data-ar="تسجيل الدخول - مُعافى">تسجيل الدخول - مُعافى</title>
        <link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="Sidebar/sidebar-mobile.css">
    <link rel="stylesheet" href="auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="auth-container">
        <img src="../logo.jpg" alt="Logo" class="logo-small">
        
        <div id="login-form">
            <h2 data-en="Login" data-ar="تسجيل الدخول">تسجيل الدخول</h2>
            <div class="form-group">
                <i class="fas fa-envelope"></i>
                <input type="email" placeholder="البريد الإلكتروني" data-en-ph="Email Address" data-ar-ph="البريد الإلكتروني" class="translate-ph">
            </div>
            <div class="form-group">
                <i class="fas fa-lock"></i>
                <input type="password" placeholder="كلمة المرور" data-en-ph="Password" data-ar-ph="كلمة المرور" class="translate-ph">
            </div>
            <button class="btn-primary" data-en="Login" data-ar="دخول">دخول</button>
            <p class="switch-text">
                <span data-en="Don't have an account?" data-ar="ليس لديك حساب؟">ليس لديك حساب؟</span> 
                <span onclick="toggleAuth()" data-en="Create one" data-ar="أنشئ حساباً">أنشئ حساباً</span>
            </p>
        </div>

        <div id="signup-form">
            <h2 data-en="Create Account" data-ar="إنشاء حساب">إنشاء حساب</h2>
            <div class="form-group">
                <i class="fas fa-user"></i>
                <input type="text" placeholder="الاسم الكامل" data-en-ph="Full Name" data-ar-ph="الاسم الكامل" class="translate-ph">
            </div>
            <div class="form-group">
                <i class="fas fa-envelope"></i>
                <input type="email" placeholder="البريد الإلكتروني" data-en-ph="Email Address" data-ar-ph="البريد الإلكتروني" class="translate-ph">
            </div>
            <div class="form-group">
                <i class="fas fa-lock"></i>
                <input type="password" placeholder="كلمة المرور" data-en-ph="Password" data-ar-ph="كلمة المرور" class="translate-ph">
            </div>
            <div class="form-group">
                <i class="fas fa-check-circle"></i>
                <input type="password" placeholder="تأكيد كلمة المرور" data-en-ph="Confirm Password" data-ar-ph="تأكيد كلمة المرور" class="translate-ph">
            </div>
            <button class="btn-primary" data-en="Sign Up" data-ar="تسجيل">تسجيل</button>
            <p class="switch-text">
                <span data-en="Already have an account?" data-ar="تملك حساباً بالفعل؟">تملك حساباً بالفعل؟</span> 
                <span onclick="toggleAuth()" data-en="Login" data-ar="تسجيل الدخول">تسجيل الدخول</span>
            </p>
        </div>

        <a href="../index.html" class="back-dashboard" data-en="← Back to Dashboard" data-ar="← العودة للوحة التحكم">← العودة للوحة التحكم</a>
    </div>

    <script>
        // تبديل بين نموذجي الدخول والتسجيل
        function toggleAuth() {
            const loginForm = document.getElementById('login-form');
            const signupForm = document.getElementById('signup-form');
            if (loginForm.style.display === "none") {
                loginForm.style.display = "block";
                signupForm.style.display = "none";
            } else {
                loginForm.style.display = "none";
                signupForm.style.display = "block";
            }
        }

        // ملاحظة: يمكنك استدعاء دالة الترجمة هنا إذا كنت ستستخدم ملف JS موحد
    </script>
    <script src="pwa-handler/pwa-handler.js"></script>
</body>
</html>
