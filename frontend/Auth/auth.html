<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - مُعافى</title>
    <link rel="stylesheet" href="auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <img src="../logo.jpg" alt="Logo" class="logo-small">

        <form id="login-form">
            <h2>تسجيل الدخول</h2>
            <div class="form-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="login-email" placeholder="البريد الإلكتروني" required>
            </div>
            <div class="form-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="login-password" placeholder="كلمة المرور" required>
            </div>
            <button type="submit" class="btn-primary">دخول</button>
            <p class="switch-text">
                <span>ليس لديك حساب؟</span> 
                <span onclick="toggleAuth()" style="cursor:pointer; color: #5A9789;">أنشئ حساباً</span>
            </p>
            <a href="../Booking/bookings.html" class="back-dashboard">← العودة للوحة التحكم</a>
        </form>

        <form id="signup-form" style="display: none;">
            <h2>إنشاء حساب</h2>
            <div class="form-group">
                <i class="fas fa-user"></i>
                <input type="text" id="reg-name" placeholder="الاسم الكامل" required>
            </div>
            <div class="form-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="reg-email" placeholder="البريد الإلكتروني" required>
            </div>
           
            <div class="form-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="reg-password" placeholder="كلمة المرور" required>
            </div>
            <div class="form-group">
                <i class="fas fa-check-circle"></i>
                <input type="password" id="reg-confirm" placeholder="تأكيد كلمة المرور" required>
            </div>
            <button type="submit" class="btn-primary">تسجيل</button>
            <p class="switch-text">
                <span>تملك حساباً بالفعل؟</span> 
                <span onclick="toggleAuth()" style="cursor:pointer; color: #5A9789;">تسجيل الدخول</span>
            </p>
            <a href="../Booking/bookings.html" class="back-dashboard">← العودة للوحة التحكم</a>
        </form>
    </div>

    <script src="auth.js"></script>
    <script src="../toast.js"></script>
</body>
</html>
